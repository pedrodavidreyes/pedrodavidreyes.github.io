<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Evaluación — Oficiales FAMM 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-50: #EAF3DE;
    --green-600: #639922;
    --green-800: #27500A;
    --red-50: #FCEBEB;
    --red-600: #A32D2D;
    --red-800: #791F1F;
    --amber-50: #FAEEDA;
    --amber-600: #BA7517;
    --amber-800: #633806;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-200: #B4B2A9;
    --gray-600: #5F5E5A;
    --gray-800: #2C2C2A;
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: #fff;
    border-bottom: 0.5px solid var(--gray-100);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--gray-600);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
    line-height: 1.3;
  }
  .progress-wrap {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--gray-100);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.35s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--gray-600);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  /* Main content area */
  .main {
    padding: 20px 16px 40px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Question card */
  .q-card {
    background: #fff;
    border-radius: var(--radius);
    border: 0.5px solid var(--gray-100);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-counter {
    font-size: 12px;
    font-weight: 500;
    color: var(--teal-dark);
    background: #E1F5EE;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-800);
    line-height: 1.55;
    margin-bottom: 20px;
  }

  /* Option buttons */
  .options-list { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--gray-50);
    border: 0.5px solid var(--gray-100);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 15px;
    color: var(--gray-800);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.45;
    -webkit-tap-highlight-color: transparent;
    min-height: 52px;
  }
  .opt-btn:active { background: var(--gray-100); }
  .opt-letter {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 50%;
    background: #fff;
    border: 0.5px solid var(--gray-200);
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    margin-top: 1px;
  }
  .opt-text { flex: 1; }

  /* States after answering */
  .opt-btn.correct {
    background: var(--green-50);
    border-color: var(--green-600);
  }
  .opt-btn.correct .opt-letter {
    background: var(--green-600);
    border-color: var(--green-600);
    color: #fff;
  }
  .opt-btn.correct .opt-text { color: var(--green-800); font-weight: 500; }

  .opt-btn.wrong {
    background: var(--red-50);
    border-color: var(--red-600);
  }
  .opt-btn.wrong .opt-letter {
    background: var(--red-600);
    border-color: var(--red-600);
    color: #fff;
  }
  .opt-btn.wrong .opt-text { color: var(--red-800); }

  .opt-btn:disabled { cursor: default; }
  .opt-btn:not(:disabled):hover { background: var(--gray-100); border-color: var(--gray-200); }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 13px 15px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .feedback.ok { background: var(--green-50); color: var(--green-800); border: 0.5px solid var(--green-600); }
  .feedback.no { background: var(--red-50); color: var(--red-800); border: 0.5px solid var(--red-600); }
  .feedback-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }

  /* Next button */
  .next-wrap { margin-top: 8px; }
  .next-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 52px;
  }
  .next-btn:active { background: var(--teal-dark); }

  /* Results card */
  .result-card {
    background: #fff;
    border-radius: var(--radius);
    border: 0.5px solid var(--gray-100);
    padding: 28px 20px 20px;
    animation: fadeUp 0.25s ease both;
  }
  .score-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    border: 3px solid;
  }
  .score-circle.great { border-color: var(--green-600); background: var(--green-50); }
  .score-circle.ok { border-color: var(--amber-600); background: var(--amber-50); }
  .score-circle.low { border-color: var(--red-600); background: var(--red-50); }

  .score-num { font-size: 28px; font-weight: 700; line-height: 1; }
  .score-circle.great .score-num { color: var(--green-800); }
  .score-circle.ok .score-num { color: var(--amber-800); }
  .score-circle.low .score-num { color: var(--red-800); }
  .score-denom { font-size: 12px; font-weight: 500; }
  .score-circle.great .score-denom { color: var(--green-600); }
  .score-circle.ok .score-denom { color: var(--amber-600); }
  .score-circle.low .score-denom { color: var(--red-600); }

  .result-title { font-size: 20px; font-weight: 600; text-align: center; color: var(--gray-800); margin-bottom: 4px; }
  .result-sub { font-size: 14px; color: var(--gray-600); text-align: center; margin-bottom: 20px; }

  .badge {
    display: block;
    width: fit-content;
    margin: 0 auto 24px;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .badge.green { background: var(--green-50); color: var(--green-800); border: 0.5px solid var(--green-600); }
  .badge.amber { background: var(--amber-50); color: var(--amber-800); border: 0.5px solid var(--amber-600); }
  .badge.red { background: var(--red-50); color: var(--red-800); border: 0.5px solid var(--red-600); }

  /* Review list */
  .review-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--gray-600);
    margin-bottom: 12px;
  }
  .review-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 0;
    border-top: 0.5px solid var(--gray-100);
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.5;
  }
  .review-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    font-weight: 700;
  }
  .review-dot.ok { background: var(--green-600); }
  .review-dot.no { background: var(--red-600); }

  .retry-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: transparent;
    color: var(--gray-800);
    border: 0.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .retry-btn:active { background: var(--gray-50); }
</style>
</head>
<body>

<header class="header">
  <div class="header-eyebrow">FAMM 2026</div>
  <div class="header-title">Evaluación — Curso de oficiales</div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 10</div>
  </div>
</header>

<main class="main" id="main"></main>

<script>
const preguntas = [
  {
    texto: "Un adulto novato está en el suelo y recibe un golpe directo a la cabeza. ¿Es legal o ilegal?",
    opciones: ["Legal, los adultos pueden golpear donde quieran","Ilegal — novatos solo pueden golpear al cuerpo en el suelo","Legal si el referee no lo ve","Depende del nivel del contrincante"],
    correcta: 1,
    explicacion: "Para novatos y principiantes, en el suelo únicamente se permite golpeo al cuerpo, no a la cabeza. El referee debe detener y señalar la falta."
  },
  {
    texto: "Un junior avanzado aplica un heel hook (palanca de talón). ¿Qué debe hacer el referee?",
    opciones: ["Dejar continuar, es técnica avanzada","Advertir verbalmente sin detener","Detener el combate — el heel hook está prohibido para avanzados","Consultar con los jueces antes de actuar"],
    correcta: 2,
    explicacion: "El heel hook (palanca de talón) está explícitamente prohibido en la categoría avanzados. El referee debe detener el combate y aplicar el procedimiento de falta."
  },
  {
    texto: "Se expulsa el protector bucal de un competidor sin intención durante el combate. ¿Cuándo detiene el tiempo el referee?",
    opciones: ["Inmediatamente, sin importar la posición","En la primera oportunidad que no altere la posición de combate","Al finalizar el round","Solo si el competidor lo pide verbalmente"],
    correcta: 1,
    explicacion: "El reglamento indica que el referee detiene el tiempo en la primera oportunidad que tenga para colocarlo de nuevo sin alterar la posición de combate en la que estén."
  },
  {
    texto: "Un competidor agarra la cerca para evitar un derribo. ¿Qué aplica el referee?",
    opciones: ["Descalificación directa","Una sola advertencia","Deducción de 2 puntos automática","Detiene el combate y consulta con los jueces"],
    correcta: 1,
    explicacion: "Agarrar la jaula es infracción de advertencia (no de punto directo). Se emite una sola advertencia. La descalificación procede tras la acumulación de 3 faltas o una falta grave."
  },
  {
    texto: "Durante un round, el 90% del tiempo los competidores estuvieron de pie. ¿Qué criterio priorizan los jueces al calificar?",
    opciones: ["Grappling efectivo primero, luego striking","Striking efectivo primero, luego grappling","Control del área como criterio único","Agresividad, sin importar el tiempo de pie"],
    correcta: 1,
    explicacion: "Los jueces usan escala móvil: si el 90% del round fue de pie, se prioriza primero la eficacia del striking y después el agarre eficaz."
  },
  {
    texto: "¿Cuántos minutos tiene la esquina del competidor para presentar una protesta después de terminado el combate?",
    opciones: ["5 minutos","10 minutos","15 minutos","30 minutos"],
    correcta: 1,
    explicacion: "La protesta debe presentarse dentro de los 10 minutos siguientes a la finalización del combate, acompañada de fotografías o videos como evidencia."
  },
  {
    texto: "Un juez avanzado asigna 10-8 a un round. ¿Cuál de estas situaciones lo justifica correctamente?",
    opciones: ["Un competidor da más golpes pero sin daño visible","Un competidor domina abrumadoramente en golpeo o combate en piso","Ambos competidores pelean con igual efectividad","Un competidor intenta sumisiones aunque no las concrete"],
    correcta: 1,
    explicacion: "Un 10-8 aplica cuando un competidor domina abrumadoramente al golpear o en combate en piso, afectando negativamente al oponente con golpes efectivos y legales."
  },
  {
    texto: "¿Cuáles son los dos tipos de vestimenta obligatoria que distinguen a los competidores masculinos de los femeninos?",
    opciones: ["Los hombres usan casco; las mujeres no","Las mujeres tienen opción de pechera y protector inguinal; los hombres llevan concha obligatoria","Los hombres usan guantes de boxeo; las mujeres guantes de MMA","No hay diferencia de vestimenta entre géneros"],
    correcta: 1,
    explicacion: "Todos los masculinos llevan concha obligatoria. Las femeninas tienen la opción de usar pechera y protector inguinal — ambos sujetos a aprobación de la comisión."
  },
  {
    texto: "En un torneo de formato eliminatorio, al término del 3er round el combate termina en empate. ¿Qué procede?",
    opciones: ["Se declara no contest","Se repite el combate al día siguiente","Se disputa un 4to round extra obligatorio","Los jueces votan entre ellos para decidir"],
    correcta: 2,
    explicacion: "En formato de torneo donde se requiere progresión, no puede haber empates ni no contest. Se disputa un 4to round extra. Solo en torneo se permite este round adicional."
  },
  {
    texto: "¿Qué puntaje de ranking obtiene el 1er lugar en un Campeonato Estatal (Torneo R2)?",
    opciones: ["15 puntos","60 puntos","130 puntos","210 puntos"],
    correcta: 1,
    explicacion: "El Torneo R2 (Campeonato Estatal) otorga 60 puntos al 1er lugar, 40 al 2do y 20 al 3er lugar. Solo aplica para categorías avanzadas y ranqueables."
  }
];

let actual = 0;
let respondidas = [];
let puntaje = 0;

function updateHeader() {
  const pct = Math.round((actual / preguntas.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = actual + ' / ' + preguntas.length;
}

function render() {
  updateHeader();
  const main = document.getElementById('main');
  if (actual >= preguntas.length) { mostrarResultados(main); return; }

  const p = preguntas[actual];
  const ya = respondidas[actual];

  const opcionesHTML = p.opciones.map((op, i) => {
    let cls = 'opt-btn';
    if (ya !== undefined) {
      if (i === p.correcta) cls += ' correct';
      else if (i === ya && ya !== p.correcta) cls += ' wrong';
    }
    const letra = String.fromCharCode(65 + i);
    return `<button class="${cls}" onclick="responder(${i})" ${ya !== undefined ? 'disabled' : ''} aria-label="Opción ${letra}: ${op}">
      <span class="opt-letter" aria-hidden="true">${letra}</span>
      <span class="opt-text">${op}</span>
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (ya !== undefined) {
    const ok = ya === p.correcta;
    feedbackHTML = `<div class="feedback ${ok ? 'ok' : 'no'}" role="alert">
      <span class="feedback-icon" aria-hidden="true">${ok ? '✓' : '✗'}</span>
      <span>${ok ? 'Correcto. ' : 'Incorrecto. '}${p.explicacion}</span>
    </div>`;
  }

  main.innerHTML = `
    <div class="q-card">
      <div class="q-counter">Pregunta ${actual + 1} de ${preguntas.length}</div>
      <p class="q-text">${p.texto}</p>
      <div class="options-list">${opcionesHTML}</div>
      ${feedbackHTML}
    </div>
    ${ya !== undefined ? `<div class="next-wrap"><button class="next-btn" onclick="siguiente()">
      ${actual < preguntas.length - 1 ? 'Siguiente pregunta →' : 'Ver resultados →'}
    </button></div>` : ''}
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function responder(idx) {
  if (respondidas[actual] !== undefined) return;
  respondidas[actual] = idx;
  if (idx === preguntas[actual].correcta) puntaje++;
  render();
}

function siguiente() {
  actual++;
  render();
}

function mostrarResultados(main) {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = '10 / 10';

  const pct = Math.round((puntaje / preguntas.length) * 100);
  const circleClass = pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'low';
  const badgeClass = pct >= 80 ? 'green' : pct >= 60 ? 'amber' : 'red';
  const badgeTxt = pct >= 80 ? '✓ Aprobado' : pct >= 60 ? '~ Suficiente' : '✗ Requiere refuerzo';
  const titulo = pct >= 80 ? '¡Muy bien!' : pct >= 60 ? 'Buen intento' : 'Sigue practicando';

  const reviewHTML = preguntas.map((p, i) => {
    const ok = respondidas[i] === p.correcta;
    return `<div class="review-item">
      <div class="review-dot ${ok ? 'ok' : 'no'}" aria-label="${ok ? 'Correcta' : 'Incorrecta'}">${ok ? '✓' : '✗'}</div>
      <span>${p.texto}</span>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="result-card">
      <div class="score-circle ${circleClass}">
        <span class="score-num">${puntaje}/${preguntas.length}</span>
        <span class="score-denom">${pct}%</span>
      </div>
      <h2 class="result-title">${titulo}</h2>
      <p class="result-sub">${pct}% de respuestas correctas</p>
      <span class="badge ${badgeClass}">${badgeTxt}</span>
      <p class="review-label">Resumen por pregunta</p>
      ${reviewHTML}
      <button class="retry-btn" onclick="reiniciar()">↺ Intentar de nuevo</button>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reiniciar() {
  actual = 0; respondidas = []; puntaje = 0;
  render();
}

render();
</script>
</body>
</html>
